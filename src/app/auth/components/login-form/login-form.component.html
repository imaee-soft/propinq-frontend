<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
  <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>
  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" formControlName="email" [class.is-invalid]="email?.invalid && email?.touched" />
    <div class="validation-error" *ngIf="email?.invalid && email?.touched">
      <span *ngIf="email?.errors?.['required']">El email es requerido</span>
      <span *ngIf="email?.errors?.['email']">Ingrese un email válido</span>
    </div>
  </div>
  <div class="form-group">
    <label for="password">Contraseña</label>
    <input type="password" id="password" formControlName="password" [class.is-invalid]="password?.invalid && password?.touched" />
    <div class="validation-error" *ngIf="password?.invalid && password?.touched">
      <span *ngIf="password?.errors?.['required']">La contraseña es requerida</span>
    </div>
  </div>
  <button type="submit" class="login-button" [disabled]="loginForm.invalid || isLoading">
    {{ isLoading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
  </button>
</form>
