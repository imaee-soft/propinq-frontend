<mat-dialog-content>
  <h2 mat-dialog-title>Cancelación de solicitud de contacto</h2>
  <div class="info-line">
    <mat-icon>calendar_today</mat-icon>
    {{ cancellationDate() | date: "dd/MM/yyyy" }}
  </div>
  <div class="info-line">
    <mat-icon>chat</mat-icon>
    <span class="info-text">{{ cancellationReason() }}</span>
  </div>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-flat-button class="close-btn" [mat-dialog-close]="false">
    <mat-icon>close</mat-icon>
    Cerrar
  </button>
</mat-dialog-actions>
