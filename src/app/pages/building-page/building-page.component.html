@if (buildingsDetailsResource.isLoading() && !page()) {
<div class="status-message loading">Cargando inmuebles...</div>
} @else if (buildingsDetailsResource.error()) {
<div class="status-message error">Error al cargar los inmuebles.</div>
} @else if (!page()) {
<div class="status-message empty">No hay inmuebles registrados.</div>
} @else if (page()!.content.length === 0) {
<div class="status-message empty">No hay inmuebles registrados.</div>
} @else {
<common-entity-page
  [elements]="page()?.content"
  [descriptor]="descriptor"
  [primaryAction]="openBuilding.bind(this)"
  [secondaryAction]="deleteOrRestoreBuilding.bind(this)"
  [primaryActionLabel]="'Modificar'"
  [allLoadedLabel]="'Estos son todos los inmuebles.'"
  [loadMoreLabel]="'Recuperar más inmuebles.'"
  [iconUrl]="'/building.png'"
  [pageTitle]="'Mis Inmuebles'"
  [newEntity]="onCreate.bind(this)"
  [newEntityLabel]="'Nuevo inmueble'"
>
</common-entity-page>
}
