<mat-dialog-content cdkTrapFocus [cdkTrapFocusAutoCapture]="true">
  <h2 mat-dialog-title>{{ dialogTitle() }}</h2>
  <ng-container *ngTemplateOutlet="content()"></ng-container>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button [mat-dialog-close]="false">Close</button>
  <button mat-flat-button type="submit" [disabled]="activeSaveButton()">
    Save
  </button>
</mat-dialog-actions>
