<mat-dialog-content>
  <h1 mat-dialog-title>{{ dialogTitle() }}</h1>
  <ng-container *ngTemplateOutlet="content()"></ng-container>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button [mat-dialog-close]="false">Cerrar</button>
  <button mat-flat-button type="submit" [disabled]="activeSaveButton()">
    Guardar
  </button>
</mat-dialog-actions>
